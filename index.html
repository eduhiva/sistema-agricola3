<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Agrícola</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 0;
      color: #111827;
    }

    .login-container {
      width: 360px;
      margin: 100px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    h1, h2 {
      text-align: center;
      color: #166534;
      margin-top: 0;
    }

    h3 {
      margin-top: 0;
      color: #166534;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: #166534;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #14532d;
    }

    .btn-gray {
      background: #6b7280 !important;
    }

    .btn-gray:hover {
      background: #4b5563 !important;
    }

    .btn-red {
      background: #991b1b !important;
    }

    .btn-red:hover {
      background: #7f1d1d !important;
    }

    .mensaje {
      margin-top: 16px;
      text-align: center;
      font-weight: bold;
      color: #166534;
    }

    .dashboard {
      display: none;
    }

    .header {
      background: #166534;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 64px);
    }

    .sidebar {
      width: 240px;
      background: #14532d;
      color: white;
      padding: 20px;
    }

    .sidebar h3 {
      margin-top: 0;
      font-size: 20px;
      color: white;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 10px;
    }

    .sidebar button {
      width: 100%;
      text-align: left;
      background: rgba(255,255,255,0.08);
      margin-bottom: 10px;
    }

    .sidebar button:hover {
      background: rgba(255,255,255,0.18);
    }

    .content {
      flex: 1;
      padding: 24px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .section-title {
      margin-bottom: 6px;
      color: #166534;
      font-size: 22px;
      font-weight: bold;
    }

    .section-subtitle {
      margin-bottom: 18px;
      color: #4b5563;
    }

    .top-actions {
      display: grid;
      grid-template-columns: 2fr 180px;
      gap: 16px;
      margin: 20px 0;
      align-items: end;
    }

    .search-bar-grid {
      display: grid;
      grid-template-columns: 1fr 140px 140px 180px;
      gap: 12px;
      align-items: end;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .form-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .hidden {
      display: none;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .toolbar button {
      width: auto;
      min-width: 170px;
      margin-top: 0;
      padding: 10px 14px;
    }

    .record-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .list-box {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .list-scroll {
      max-height: 560px;
      overflow-y: auto;
      padding-right: 4px;
      margin-top: 12px;
    }

    .person-item {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .person-item:hover {
      border-color: #166534;
      background: #f0fdf4;
    }

    .person-item.active {
      border-color: #166534;
      background: #dcfce7;
    }

    .person-name {
      font-weight: bold;
      color: #166534;
      margin-bottom: 4px;
    }

    .person-meta {
      font-size: 13px;
      color: #4b5563;
      line-height: 1.4;
    }

    .panel-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      min-height: 420px;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .mini-card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      background: #f9fafb;
    }

    .mini-card h4 {
      margin: 0 0 8px 0;
      color: #166534;
      font-size: 16px;
    }

    .mini-card p {
      margin: 0;
      font-size: 14px;
      color: #4b5563;
      line-height: 1.45;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 16px;
    }

    .info-row {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
    }

    .info-row strong {
      display: block;
      margin-bottom: 6px;
      color: #166534;
    }

    .result-box {
      margin-top: 12px;
      padding: 10px 12px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      color: #166534;
      font-size: 14px;
      font-weight: bold;
    }

    @media (max-width: 1100px) {
      .search-bar-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: auto;
      }

      .record-layout {
        grid-template-columns: 1fr;
      }

      .top-actions,
      .form-grid,
      .form-grid-3,
      .info-grid,
      .search-bar-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div id="loginView" class="login-container">
    <h1>Login Sistema Agrícola</h1>
    <input id="user" type="text" placeholder="Usuario" />
    <input id="pass" type="password" placeholder="Clave" />
    <button onclick="login()">Ingresar</button>
    <div class="mensaje" id="mensaje"></div>
  </div>

  <div id="dashboardView" class="dashboard">
    <div class="header">Sistema Agrícola Web</div>

    <div class="layout">
      <div class="sidebar">
        <h3>Menú</h3>
        <button onclick="mostrarSeccion('inicio')">Inicio</button>
        <button onclick="mostrarSeccion('agricultores')">Agricultores</button>
        <button onclick="mostrarSeccion('predios')">Predios</button>
        <button onclick="mostrarSeccion('produccion')">Producción Lechera</button>
        <button onclick="mostrarSeccion('informes')">Informes</button>
        <button class="btn-red" onclick="cerrarSesion()">Cerrar sesión</button>
      </div>

      <div class="content" id="contenido"></div>
    </div>
  </div>

  <script>
    let usuarioActivo = "";
    let agricultorSeleccionado = null;
    let listaVisibleAgricultores = [];

    let agricultores = [
      {
        id: 1,
        nombre: "Juan Pérez Soto",
        rut: "12.345.678-9",
        telefono: "+56 9 8765 4321",
        correo: "juanperez@email.cl",
        comuna: "Puerto Varas",
        localidad: "Nueva Braunau",
        direccion: "Sector Rural Parcela 8",
        rubro: "Lechero",
        estado: "Activo",
        observaciones: "Productor con información base ya cargada."
      },
      {
        id: 2,
        nombre: "María González Ruiz",
        rut: "9.876.543-2",
        telefono: "+56 9 9988 7766",
        correo: "mariagonzalez@email.cl",
        comuna: "Llanquihue",
        localidad: "Pichilaguna",
        direccion: "Camino interior km 3",
        rubro: "Lechero",
        estado: "Activo",
        observaciones: "Pendiente completar documentos de predios."
      }
    ];

    listaVisibleAgricultores = [...agricultores];

    function login() {
      const u = document.getElementById("user").value.trim();
      const p = document.getElementById("pass").value.trim();
      const mensaje = document.getElementById("mensaje");

      if (
        (u === "admin" && p === "1234") ||
        (u === "asesor" && p === "1234") ||
        (u === "secretaria" && p === "1234")
      ) {
        usuarioActivo = u;
        document.getElementById("loginView").style.display = "none";
        document.getElementById("dashboardView").style.display = "block";
        mensaje.textContent = "";
        mostrarInicio(u);
      } else {
        mensaje.textContent = "Datos incorrectos";
      }
    }

    function cerrarSesion() {
      document.getElementById("dashboardView").style.display = "none";
      document.getElementById("loginView").style.display = "block";
      document.getElementById("user").value = "";
      document.getElementById("pass").value = "";
      document.getElementById("mensaje").textContent = "";
      usuarioActivo = "";
      agricultorSeleccionado = null;
      listaVisibleAgricultores = [...agricultores];
    }

    function mostrarInicio(usuario) {
      document.getElementById("contenido").innerHTML = `
        <div class="section-title">Bienvenido ${usuario}</div>
        <div class="section-subtitle">Portal inicial del sistema agrícola.</div>

        <div class="card-grid">
          <div class="card">
            <h3>Agricultores</h3>
            <p>Busque al agricultor y entre directamente a sus módulos de trabajo.</p>
          </div>
          <div class="card">
            <h3>Predios</h3>
            <p>Relación entre roles, superficie, documentos y rubros.</p>
          </div>
          <div class="card">
            <h3>Producción Lechera</h3>
            <p>Control histórico mensual y anual de producción, calidad y precios.</p>
          </div>
          <div class="card">
            <h3>Informes</h3>
            <p>Espacio para revisar, imprimir y guardar informes por agricultor.</p>
          </div>
        </div>
      `;
    }

    function mostrarSeccion(seccion) {
      if (seccion === "inicio") {
        mostrarInicio(usuarioActivo || "usuario");
        return;
      }

      if (seccion === "agricultores") {
        renderAgricultores();
        return;
      }

      if (seccion === "predios") {
        document.getElementById("contenido").innerHTML = `
          <div class="section-title">Predios</div>
          <div class="section-subtitle">Módulo general de predios.</div>

          <div class="card-grid">
            <div class="card">
              <h3>Rol del predio</h3>
              <p>Cada predio se identificará por su número de rol.</p>
            </div>
            <div class="card">
              <h3>Superficie</h3>
              <p>Registro de hectáreas totales y hectáreas asignadas por rubro.</p>
            </div>
            <div class="card">
              <h3>Documentos</h3>
              <p>Espacio futuro para tenencia, avalúos fiscales y respaldo digital.</p>
            </div>
          </div>
        `;
        return;
      }

      if (seccion === "produccion") {
        document.getElementById("contenido").innerHTML = `
          <div class="section-title">Producción Lechera</div>
          <div class="section-subtitle">Módulo general de producción.</div>

          <div class="card-grid">
            <div class="card">
              <h3>Indicadores</h3>
              <p>Litros totales, litros por hectárea y litros por vaca masa.</p>
            </div>
            <div class="card">
              <h3>Calidad de leche</h3>
              <p>RCS, UFC, grasa, proteína, precio e ingresos mensuales.</p>
            </div>
            <div class="card">
              <h3>Historial</h3>
              <p>Visualización por año y por mes con años arriba y meses al lado izquierdo.</p>
            </div>
          </div>
        `;
        return;
      }

      if (seccion === "informes") {
        document.getElementById("contenido").innerHTML = `
          <div class="section-title">Informes</div>
          <div class="section-subtitle">Módulo general de informes.</div>

          <div class="card-grid">
            <div class="card">
              <h3>Formato</h3>
              <p>Salida en hoja tamaño carta, a color, con tablas y gráficos.</p>
            </div>
            <div class="card">
              <h3>Portada</h3>
              <p>Primera hoja con logo, nombre del agricultor e indicadores principales.</p>
            </div>
            <div class="card">
              <h3>Recomendaciones</h3>
              <p>Última hoja con conclusiones y sugerencias técnicas.</p>
            </div>
          </div>
        `;
      }
    }

    function renderAgricultores() {
      listaVisibleAgricultores = [...agricultores];

      document.getElementById("contenido").innerHTML = `
        <div class="section-title">Agricultores</div>
        <div class="section-subtitle">Busque al agricultor y acceda a su información principal.</div>

        <div class="card">
          <div class="search-bar-grid">
            <div>
              <label>Buscar agricultor</label>
              <input id="buscadorAgricultor" type="text" placeholder="Nombre, RUT, comuna o localidad" onkeypress="teclaBuscar(event)">
            </div>
            <div>
              <button onclick="buscarAgricultor()">Buscar</button>
            </div>
            <div>
              <button class="btn-gray" onclick="mostrarTodosAgricultores()">Mostrar todos</button>
            </div>
            <div>
              <button onclick="mostrarFormularioAgricultor()">Crear agricultor</button>
            </div>
          </div>

          <div id="resultadoBusqueda" class="result-box">
            Mostrando ${agricultores.length} agricultor(es) en el listado.
          </div>

          <div id="formAgricultor" class="hidden">
            <div class="card" style="background:#f9fafb; box-shadow:none; border:1px solid #e5e7eb; margin-top:18px;">
              <h3>Nuevo agricultor</h3>

              <div class="form-grid">
                <div>
                  <label>Nombre completo</label>
                  <input id="nuevoNombre" type="text" placeholder="Nombre del agricultor">
                </div>
                <div>
                  <label>RUT</label>
                  <input id="nuevoRut" type="text" placeholder="RUT">
                </div>
                <div>
                  <label>Teléfono</label>
                  <input id="nuevoTelefono" type="text" placeholder="Teléfono">
                </div>
                <div>
                  <label>Correo</label>
                  <input id="nuevoCorreo" type="text" placeholder="Correo electrónico">
                </div>
                <div>
                  <label>Comuna</label>
                  <input id="nuevoComuna" type="text" placeholder="Comuna">
                </div>
                <div>
                  <label>Localidad</label>
                  <input id="nuevoLocalidad" type="text" placeholder="Localidad o sector">
                </div>
              </div>

              <div class="form-grid-3">
                <div>
                  <label>Dirección</label>
                  <input id="nuevoDireccion" type="text" placeholder="Dirección o referencia">
                </div>
                <div>
                  <label>Rubro principal</label>
                  <select id="nuevoRubro">
                    <option value="Lechero">Lechero</option>
                    <option value="Carne">Carne</option>
                    <option value="Agricultura">Agricultura</option>
                    <option value="Mixto">Mixto</option>
                  </select>
                </div>
                <div>
                  <label>Estado</label>
                  <select id="nuevoEstado">
                    <option value="Activo">Activo</option>
                    <option value="Pendiente">Pendiente</option>
                    <option value="Inactivo">Inactivo</option>
                  </select>
                </div>
              </div>

              <div>
                <label>Observaciones iniciales</label>
                <textarea id="nuevoObservaciones" placeholder="Antecedentes generales de la entrevista"></textarea>
              </div>

              <div class="toolbar">
                <button onclick="guardarAgricultorDemo()">Guardar agricultor</button>
                <button class="btn-gray" onclick="ocultarFormularioAgricultor()">Cancelar</button>
              </div>

              <div id="mensajeAgricultor" class="mensaje"></div>
            </div>
          </div>
        </div>

        <div class="record-layout">
          <div class="list-box">
            <h3>Listado de agricultores</h3>
            <div class="list-scroll">
              <div id="listaAgricultores"></div>
            </div>
          </div>

          <div class="panel-box" id="panelAgricultor">
            <h3>Seleccione un agricultor</h3>
            <p>Aquí aparecerá la ficha principal y los accesos rápidos del agricultor seleccionado.</p>
          </div>
        </div>
      `;

      renderListaAgricultores(listaVisibleAgricultores);
    }

    function renderListaAgricultores(lista) {
      const contenedor = document.getElementById("listaAgricultores");
      if (!contenedor) return;

      if (lista.length === 0) {
        contenedor.innerHTML = `<p>No se encontraron agricultores.</p>`;
        return;
      }

      let html = "";
      lista.forEach(a => {
        const activo = agricultorSeleccionado && agricultorSeleccionado.id === a.id ? "active" : "";
        html += `
          <div class="person-item ${activo}" onclick="seleccionarAgricultor(${a.id})">
            <div class="person-name">${a.nombre}</div>
            <div class="person-meta">
              RUT: ${a.rut}<br>
              Comuna: ${a.comuna}<br>
              Rubro: ${a.rubro}
            </div>
          </div>
        `;
      });

      contenedor.innerHTML = html;
    }

    function actualizarMensajeBusqueda(texto) {
      const caja = document.getElementById("resultadoBusqueda");
      if (caja) caja.textContent = texto;
    }

    function teclaBuscar(event) {
      if (event.key === "Enter") {
        buscarAgricultor();
      }
    }

    function buscarAgricultor() {
      const campo = document.getElementById("buscadorAgricultor");
      if (!campo) return;

      const texto = campo.value.toLowerCase().trim();

      if (!texto) {
        listaVisibleAgricultores = [...agricultores];
        renderListaAgricultores(listaVisibleAgricultores);
        actualizarMensajeBusqueda(`Mostrando ${listaVisibleAgricultores.length} agricultor(es) en el listado.`);
        return;
      }

      listaVisibleAgricultores = agricultores.filter(a =>
        a.nombre.toLowerCase().includes(texto) ||
        a.rut.toLowerCase().includes(texto) ||
        a.comuna.toLowerCase().includes(texto) ||
        a.localidad.toLowerCase().includes(texto)
      );

      renderListaAgricultores(listaVisibleAgricultores);

      if (listaVisibleAgricultores.length > 0) {
        actualizarMensajeBusqueda(`Búsqueda realizada: ${listaVisibleAgricultores.length} agricultor(es) encontrado(s).`);
      } else {
        actualizarMensajeBusqueda("Búsqueda realizada: no se encontraron agricultores.");
      }
    }

    function mostrarTodosAgricultores() {
      const campo = document.getElementById("buscadorAgricultor");
      if (campo) campo.value = "";

      listaVisibleAgricultores = [...agricultores];
      renderListaAgricultores(listaVisibleAgricultores);
      actualizarMensajeBusqueda(`Mostrando ${listaVisibleAgricultores.length} agricultor(es) en el listado.`);
    }

    function seleccionarAgricultor(id) {
      const encontrado = agricultores.find(a => a.id === id);
      if (!encontrado) return;

      agricultorSeleccionado = encontrado;
      renderListaAgricultores(listaVisibleAgricultores);

      document.getElementById("panelAgricultor").innerHTML = `
        <h3>${encontrado.nombre}</h3>
        <p><strong>Estado:</strong> ${encontrado.estado} | <strong>Rubro:</strong> ${encontrado.rubro}</p>

        <div class="info-grid">
          <div class="info-row">
            <strong>RUT</strong>
            ${encontrado.r
